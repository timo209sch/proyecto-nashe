<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Havenna</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="home">

        
    <header class="header">
        <div class="logo-container">
            <!-- logo -->
            <img class="logo" src="logo havenna.jpg" alt="Logo de Havenna">
        </div>

        <!-- botones -->
        <div class="header-actions">
            <a href="contacto.html" class="btn-action-top">
                <img src="casa.png" alt="Ícono de franquicias" class="icon-nav"> FRANQUICIAS
            </a>
            <a href="contacto.html" class="btn-action-top">
                <img src="telefono.png" alt="Ícono de teléfono" class="icon-nav"> CONTACTO
            </a>
            <a href="productos.html" class="btn-action-top accent">
                <img src="carro.png" alt="Ícono de carrito" class="icon-nav"> TIENDA
            </a>
        </div>
    </header>

    <nav class="nav">
            <ul>
                <li><a href="index.html" class="active">Inicio</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="menu.html">Cafetería</a></li>
                <li><a href="contacto.html">Locales</a></li>
            </ul>
    </nav>

    <main class="container">
    <div class="section-title">
        <h3>Contacto y Franquicias</h3>
        <p>Dejanos tu mensaje y formá parte de la experiencia Havenna</p>
    </div>

    <section class="form-section">
        <form  method="POST" class="contact-form">
            
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Ignacio Pipers" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="asunto">Asunto:</label>
                <input type="text" id="asunto" name="asunto" placeholder="Motivo de tu consulta" required>
            </div>

            <div class="form-group">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="6" cols="50" placeholder="Escribí tu mensaje acá..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Mensaje</button>
        </form>
    </section>
</main>

    <footer class="footer">
        <p>&copy; 2026 Havenna S.A. | Proyecto Integrador Taller Web 1</p>
        <div class="footer-socials">
            <img src="logotipo-de-instagram.png" alt="Instagram de Havenna">
            <img src="facebook.png" alt="Facebook de Havenna">
        </div>
    </footer>

</body>
</html>
